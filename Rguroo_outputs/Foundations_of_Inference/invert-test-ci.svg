<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Inverting hypothesis tests to obtain a confidence interval">
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaf7ec"/>
      <stop offset="100%" stop-color="#cdebd2"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdebec"/>
      <stop offset="100%" stop-color="#f7c9cf"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="860" height="270" rx="18" fill="#ffffff" stroke="#d0d7de"/>
  <text x="450" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#19345d">Inverting tests to get a confidence interval</text>

  <g filter="url(#shadow)">
    <rect x="80" y="112" width="220" height="72" rx="10" fill="url(#pinkGrad)" stroke="#cc7a85" stroke-width="2"/>
    <rect x="300" y="112" width="300" height="72" rx="0" fill="url(#greenGrad)" stroke="#5f9f6c" stroke-width="2"/>
    <rect x="600" y="112" width="220" height="72" rx="10" fill="url(#pinkGrad)" stroke="#cc7a85" stroke-width="2"/>
    <rect x="292" y="112" width="16" height="72" fill="url(#greenGrad)" stroke="none"/>
    <rect x="592" y="112" width="16" height="72" fill="url(#greenGrad)" stroke="none"/>
  </g>

  <text x="190" y="142" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#a6323d">Reject H₀</text>
  <text x="190" y="166" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#6b1f28">parameter too small</text>

  <text x="450" y="140" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#256333">Fail to reject H₀</text>
  <text x="450" y="166" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#315c39">plausible parameter values</text>

  <text x="710" y="142" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#a6323d">Reject H₀</text>
  <text x="710" y="166" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#6b1f28">parameter too large</text>

  <line x1="300" y1="92" x2="300" y2="230" stroke="#111827" stroke-width="2" stroke-dasharray="7,6"/>
  <line x1="600" y1="92" x2="600" y2="230" stroke="#111827" stroke-width="2" stroke-dasharray="7,6"/>
  <line x1="450" y1="84" x2="450" y2="236" stroke="#1f5ea8" stroke-width="4"/>
  <circle cx="450" cy="112" r="8" fill="#1f5ea8" stroke="#ffffff" stroke-width="3"/>
  <text x="450" y="96" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#1f5ea8">observed sample mean</text>

  <line x1="65" y1="240" x2="835" y2="240" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="450" y="284" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#111827">parameter values being tested</text>

  <text x="300" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#111827">θ<tspan baseline-shift="sub" font-size="14">L</tspan></text>
  <text x="450" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#1f5ea8">observed x̄</text>
  <text x="600" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#111827">θ<tspan baseline-shift="sub" font-size="14">U</tspan></text>
</svg>
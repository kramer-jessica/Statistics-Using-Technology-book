<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Number line showing the alternative-hypothesis support and the rejection rule for a one-sided test</title>
<desc>A number line for the sample mean in the SAT example. The boundary value is 508. Everything to the right of 508 is the direction favored by the alternative hypothesis mu greater than 508. A critical value at 535 sits inside that region; the rejection region is everything at or above 535. The observed sample mean of 542 lies in the rejection region, so the null hypothesis is rejected.</desc>
<defs>
  <marker id="arrowh" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#3d3d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrowteal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrowcoral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Scale: x = 70 + (val-490)*5.2 ; 490->70, 508->163.6, 535->304, 542->340.4, 590->590 -->

<!-- Ha support band (everything from boundary 508 onward) : teal ray above axis -->
<line x1="164" y1="58" x2="610" y2="58" stroke="#1D9E75" stroke-width="2.5" marker-end="url(#arrowteal)"/>
<line x1="164" y1="50" x2="164" y2="66" stroke="#1D9E75" stroke-width="2.5"/>
<text x="370" y="44" text-anchor="middle" fill="#1D9E75" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">H&#8336; support: values favoring  H&#8336;: &#956; &gt; 508</text>

<!-- Rejection region (from critical value 535 onward) : coral ray below axis -->
<line x1="304" y1="126" x2="610" y2="126" stroke="#D85A30" stroke-width="2.5" marker-end="url(#arrowcoral)"/>
<line x1="304" y1="118" x2="304" y2="134" stroke="#D85A30" stroke-width="2.5"/>
<text x="470" y="148" text-anchor="middle" fill="#D85A30" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">rejection region: reject H&#8320; when  x&#772; &#8805; 535</text>

<!-- Main axis -->
<line x1="55" y1="92" x2="625" y2="92" stroke="#3d3d3a" stroke-width="1.2" marker-end="url(#arrowh)"/>
<text x="618" y="80" text-anchor="end" fill="#6b6b66" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="11" font-style="italic">sample mean  x&#772;</text>

<!-- Boundary value 508 -->
<line x1="164" y1="84" x2="164" y2="100" stroke="#3d3d3a" stroke-width="1.4"/>
<circle cx="164" cy="92" r="5.5" fill="#3d3d3a"/>
<text x="164" y="112" text-anchor="middle" fill="#3d3d3a" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">508</text>
<text x="164" y="176" text-anchor="middle" fill="#6b6b66" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="11">boundary value &#956;&#8320;</text>

<!-- Critical value 535 -->
<line x1="304" y1="84" x2="304" y2="100" stroke="#D85A30" stroke-width="1.4"/>
<circle cx="304" cy="92" r="5.5" fill="#D85A30"/>
<text x="290" y="112" text-anchor="end" fill="#D85A30" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">535</text>
<text x="250" y="180" text-anchor="middle" fill="#6b6b66" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="11">critical value</text>

<!-- Observed sample mean 542 : gold diamond -->
<polygon points="340,82 347,92 340,102 333,92" fill="#BA7517"/>
<text x="356" y="112" text-anchor="start" fill="#BA7517" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">542</text>
<text x="430" y="180" text-anchor="middle" fill="#6b6b66" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="11">observed mean &#8594; falls in rejection region &#8594; reject H&#8320;</text>

<!-- guide line from observed-mean caption up to diamond -->
<line x1="340" y1="104" x2="340" y2="112" stroke="#BA7517" stroke-width="0.8" stroke-dasharray="2,2"/>
</svg>

<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" font-family="var(--font-sans)" style="">
<title id="title" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Colorblind-friendly comparison of the t distribution with 4 degrees of freedom and the standard normal distribution</title>
<desc id="desc" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Two overlaid bell-shaped density curves on the same axes, distinguished by both color and line style. The standard normal curve is a solid dark-blue line, taller at the center and dropping off faster. The t distribution with 4 degrees of freedom is a dashed orange line, lower at the center with noticeably heavier tails. The right-tail region beyond 2 is marked for both: a solid blue fill for the normal and a diagonally hatched orange fill for the t, showing the t distribution has clearly more area in the tail.</desc>

<defs>
<pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
<rect width="6" height="6" fill="#E69F00" fill-opacity="0.18"/>
<line x1="0" y1="0" x2="0" y2="6" stroke="#E69F00" stroke-width="2"/>
</pattern>
</defs>


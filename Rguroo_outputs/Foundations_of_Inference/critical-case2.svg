<svg width="100%" viewBox="0 0 740 210" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Critical region, Case 2</title>
<desc>SAT example, Ha mu less than 508. Critical value 481; rejection region is values at or below 481. Left panel: observed mean 474 is inside, reject H0. Right panel: observed mean 495 is outside, fail to reject H0.</desc>
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#3d3d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style type="text/css">
    .lbl { font-family:'Anthropic Sans',-apple-system,'Segoe UI',sans-serif; font-size:12px; fill:#3d3d3a; }
    .sub { font-family:'Anthropic Sans',-apple-system,'Segoe UI',sans-serif; font-size:10.5px; fill:#6b6b66; }
    .obs { font-family:'Anthropic Sans',-apple-system,'Segoe UI',sans-serif; font-size:12px; font-weight:700; fill:#BA7517; }
    .coral { fill:#D85A30; font-family:'Anthropic Sans',-apple-system,'Segoe UI',sans-serif; font-size:11px; font-weight:600; }
    .verdict { font-family:'Anthropic Sans',-apple-system,'Segoe UI',sans-serif; font-size:12.5px; font-weight:700; }
    .ptitle { font-family:'Anthropic Sans',-apple-system,'Segoe UI',sans-serif; font-size:11.5px; fill:#6b6b66; }
  </style>
</defs>
<text class="ptitle" x="185" y="16" text-anchor="middle">Observed inside &#8594; reject</text>
<text class="ptitle" x="555" y="16" text-anchor="middle">Observed outside &#8594; fail to reject</text>
<g transform="translate(0,0)">
  <line x1="10" y1="110" x2="340" y2="110" stroke="#3d3d3a" stroke-width="1.1" marker-end="url(#ah)"/>
  <line x1="107.5" y1="84" x2="8" y2="84" stroke="#D85A30" stroke-width="2.3" marker-end="url(#ac)"/>
  <line x1="107.5" y1="77" x2="107.5" y2="91" stroke="#D85A30" stroke-width="2.3"/>
  <line x1="107.5" y1="104" x2="107.5" y2="116" stroke="#D85A30" stroke-width="1.2"/>
  <text class="coral" x="107.5" y="130" text-anchor="middle">481</text>
  <text class="sub" x="107.5" y="143" text-anchor="middle">crit. value</text>
  <text class="coral" x="57.8" y="75" text-anchor="middle">rejection region</text>
  <line x1="175.0" y1="105" x2="175.0" y2="115" stroke="#3d3d3a" stroke-width="1"/>
  <circle cx="175.0" cy="110" r="4.5" fill="#3d3d3a"/>
  <text class="lbl" x="175.0" y="130" text-anchor="middle">508</text>
  <text class="sub" x="175.0" y="143" text-anchor="middle">&#956;&#8320;</text>
  <polygon points="90.0,101 95.5,110 90.0,119 84.5,110" fill="#BA7517"/>
  <text class="obs" x="90.0" y="96" text-anchor="middle">474</text>
  <text class="verdict" x="175" y="166" text-anchor="middle" fill="#D85A30">Reject H&#8320;</text>
</g>
<line x1="370" y1="20" x2="370" y2="190" stroke="#d8d8d4" stroke-width="1"/>
<g transform="translate(370,0)">
  <line x1="10" y1="110" x2="340" y2="110" stroke="#3d3d3a" stroke-width="1.1" marker-end="url(#ah)"/>
  <line x1="107.5" y1="84" x2="8" y2="84" stroke="#D85A30" stroke-width="2.3" marker-end="url(#ac)"/>
  <line x1="107.5" y1="77" x2="107.5" y2="91" stroke="#D85A30" stroke-width="2.3"/>
  <line x1="107.5" y1="104" x2="107.5" y2="116" stroke="#D85A30" stroke-width="1.2"/>
  <text class="coral" x="107.5" y="130" text-anchor="middle">481</text>
  <text class="sub" x="107.5" y="143" text-anchor="middle">crit. value</text>
  <text class="coral" x="57.8" y="75" text-anchor="middle">rejection region</text>
  <line x1="175.0" y1="105" x2="175.0" y2="115" stroke="#3d3d3a" stroke-width="1"/>
  <circle cx="175.0" cy="110" r="4.5" fill="#3d3d3a"/>
  <text class="lbl" x="175.0" y="130" text-anchor="middle">508</text>
  <text class="sub" x="175.0" y="143" text-anchor="middle">&#956;&#8320;</text>
  <polygon points="142.5,101 148.0,110 142.5,119 137.0,110" fill="#BA7517"/>
  <text class="obs" x="142.5" y="96" text-anchor="middle">495</text>
  <text class="verdict" x="175" y="166" text-anchor="middle" fill="#1D9E75">Fail to reject H&#8320;</text>
</g>
</svg>

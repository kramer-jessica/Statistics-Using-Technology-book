<polygon points="424,54 431,64 424,74 417,64" fill="#BA7517" stroke="#BA7517" stroke-width="0.5" style="fill:rgb(186, 117, 23);stroke:rgb(186, 117, 23);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<svg width="100%" viewBox="0 0 640 175" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Ha support, Case 2</title>
<desc>SAT example, Ha mu less than 508, observed mean 478. The Ha support is every value at or below the observed mean 478, shown as a teal ray starting at 478 and extending left. The boundary 508 is marked for reference.</desc>
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#3d3d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="at" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style type="text/css">
    .lbl { font-family:'Anthropic Sans',-apple-system,'Segoe UI',sans-serif; font-size:13px; fill:#3d3d3a; }
    .sub { font-family:'Anthropic Sans',-apple-system,'Segoe UI',sans-serif; font-size:12px; fill:#6b6b66; }
    .obs { font-family:'Anthropic Sans',-apple-system,'Segoe UI',sans-serif; font-size:13px; font-weight:700; fill:#BA7517; }
    .teal { fill:#1D9E75; font-family:'Anthropic Sans',-apple-system,'Segoe UI',sans-serif; font-size:13px; font-weight:600; }
    .mir { fill:#1D9E75; font-family:'Anthropic Sans',-apple-system,'Segoe UI',sans-serif; font-size:13px; font-weight:600; }
  </style>
</defs>
<line x1="170.7" y1="65" x2="35" y2="65" stroke="#1D9E75" stroke-width="2.4" marker-end="url(#at)"/>
<line x1="170.7" y1="57" x2="170.7" y2="73" stroke="#1D9E75" stroke-width="2.4"/>
<text class="teal" x="320" y="35" text-anchor="middle">H&#8336; support: every value at or below 478</text>
<line x1="20" y1="95" x2="620" y2="95" stroke="#3d3d3a" stroke-width="1.2" marker-end="url(#ah)"/>
<g><text class="sub" x="616" y="117" text-anchor="end" font-style="italic">sample mean x</text><line x1="611" y1="107" x2="617" y2="107" stroke="#6b6b66" stroke-width="0.9"/></g>
<line x1="310.7" y1="89" x2="310.7" y2="101" stroke="#3d3d3a" stroke-width="1"/>
<circle cx="310.7" cy="95" r="5" fill="#3d3d3a"/>
<text class="lbl" x="310.7" y="117" text-anchor="middle">508</text>
<text class="sub" x="310.7" y="133" text-anchor="middle">boundary &#956;&#8320;</text>
<polygon points="170.7,85 176.7,95 170.7,105 164.7,95" fill="#BA7517"/>
<text class="obs" x="170.7" y="117" text-anchor="middle">478</text>
<g><text class="sub" x="170.7" y="133" text-anchor="middle">observed mean</text></g>
</svg>

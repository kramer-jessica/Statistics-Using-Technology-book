<svg width="100%" viewBox="0 0 680 175" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Number line showing confidence interval grid values for a mean</title>
<desc>A number line of candidate values for the population mean math SAT score, with grid points at 500 through 590 in steps of 10. The observed sample mean is 542. Candidate values far from 542 (500, 510, 590) are rejected and shown in coral; candidate values near it (520 through 580) are not rejected and shown in teal, forming an approximate confidence interval.</desc>
<defs>
  <marker id="arrowm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#3d3d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Scale: 500 -> x=70, each 10 units -> 56px ; x = 70 + (val-500)*5.6 -->
<!-- 500->70, 510->126, 520->182, 530->238, 540->294, 542->305.2, 550->350, 560->406, 570->462, 580->518, 590->574 -->

<!-- Axis line -->
<line x1="55" y1="92" x2="620" y2="92" stroke="#3d3d3a" stroke-width="1.2" marker-end="url(#arrowm)"/>
<line x1="70" y1="86" x2="70" y2="98" stroke="#3d3d3a" stroke-width="1"/>
<text x="70" y="114" text-anchor="middle" fill="#D85A30" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="12">500</text>
<text x="610" y="80" text-anchor="end" fill="#6b6b66" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="11" font-style="italic">candidate values of the mean &#956;</text>

<!-- Teal bracket for CI region (520 to 580) -->
<line x1="182" y1="70" x2="518" y2="70" stroke="#1D9E75" stroke-width="2"/>
<line x1="182" y1="64" x2="182" y2="76" stroke="#1D9E75" stroke-width="2"/>
<line x1="518" y1="64" x2="518" y2="76" stroke="#1D9E75" stroke-width="2"/>
<text x="350" y="58" text-anchor="middle" fill="#1D9E75" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="12">fail to reject H&#8320; (approximate CI)</text>

<!-- Rejected points: 500, 510, 590 -->
<circle cx="70" cy="92" r="6" fill="#D85A30"/>
<circle cx="126" cy="92" r="6" fill="#D85A30"/>
<text x="126" y="114" text-anchor="middle" fill="#D85A30" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="12">510</text>
<circle cx="574" cy="92" r="6" fill="#D85A30"/>
<text x="574" y="114" text-anchor="middle" fill="#D85A30" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="12">590</text>

<!-- Fail to reject points: 520, 530, 550, 560, 570, 580 (540 region holds observed) -->
<circle cx="182" cy="92" r="6" fill="#1D9E75"/>
<text x="182" y="114" text-anchor="middle" fill="#1D9E75" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="12">520</text>
<circle cx="238" cy="92" r="6" fill="#1D9E75"/>
<text x="238" y="114" text-anchor="middle" fill="#1D9E75" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="12">530</text>
<circle cx="350" cy="92" r="6" fill="#1D9E75"/>
<text x="350" y="114" text-anchor="middle" fill="#1D9E75" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="12">550</text>
<circle cx="406" cy="92" r="6" fill="#1D9E75"/>
<text x="406" y="114" text-anchor="middle" fill="#1D9E75" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="12">560</text>
<circle cx="462" cy="92" r="6" fill="#1D9E75"/>
<text x="462" y="114" text-anchor="middle" fill="#1D9E75" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="12">570</text>
<circle cx="518" cy="92" r="6" fill="#1D9E75"/>
<text x="518" y="114" text-anchor="middle" fill="#1D9E75" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="12">580</text>

<!-- Observed sample mean 542 highlighted with diamond -->
<polygon points="305,76 311,86 305,96 299,86" fill="#BA7517"/>
<text x="305" y="132" text-anchor="middle" fill="#BA7517" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">542</text>
<text x="305" y="146" text-anchor="middle" fill="#BA7517" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="11">observed mean</text>

<!-- Legend -->
<circle cx="96" cy="162" r="6" fill="#D85A30"/>
<text x="108" y="166" fill="#3d3d3a" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="12">Reject H&#8320;</text>
<circle cx="216" cy="162" r="6" fill="#1D9E75"/>
<text x="228" y="166" fill="#3d3d3a" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="12">Fail to reject H&#8320;</text>
<polygon points="372,153 378,162 372,171 366,162" fill="#BA7517"/>
<text x="384" y="166" fill="#3d3d3a" font-family="'Anthropic Sans', -apple-system, 'Segoe UI', sans-serif" font-size="12">observed mean = 542</text>
</svg>

<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" font-family="var(--font-sans)" style="">
<title id="title" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Comparison of t distributions with 1, 3, and 10 degrees of freedom and the standard normal distribution</title>
<desc id="desc" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Four overlaid bell-shaped density curves on a horizontal axis from -4 to 4, distinguished by both color and line style. The t distribution with 1 degree of freedom is the lowest and flattest at the center with the heaviest tails. The t distribution with 3 degrees of freedom is taller, and the t with 10 degrees of freedom is taller still, with progressively lighter tails. The standard normal distribution, shown as a dashed gray line, is the tallest and narrowest of all. As the degrees of freedom increase, the t curves rise at the center, pull in their tails, and approach the standard normal.</desc>

